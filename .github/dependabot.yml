updates:
  - assignees:
      - ffflorian
    commit-message:
      prefix: fix(deps)
    cooldown:
      default-days: 5
      exclude:
        - nginx
    directory: /
    open-pull-requests-limit: 99
    package-ecosystem: docker
    schedule:
      interval: weekly
  - assignees:
      - ffflorian
    commit-message:
      prefix: ci(deps)
    cooldown:
      default-days: 5
      exclude:
        - ffflorian/*
    directory: /
    groups:
      ffflorian:
        patterns:
          - ffflorian/actions/*
    open-pull-requests-limit: 99
    package-ecosystem: github-actions
    schedule:
      interval: weekly
version: 2
